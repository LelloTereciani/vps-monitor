services:
  vps-monitor:
    build: .
    container_name: vps-monitor
    restart: unless-stopped
    network_mode: host
    volumes:
      - /proc:/proc:ro
      - /etc/os-release:/etc/host-os-release:ro
    environment:
      PORT: 9090
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
